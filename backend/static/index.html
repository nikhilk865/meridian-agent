<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🧭 Meridian Agent - Study Hub</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; max-width: 850px; margin: 40px auto; padding: 20px; background: #0b0f19; color: #f3f4f6; }
        .card { background: #111827; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #1f2937; }
        h2 { color: #38bdf8; font-weight: 700; margin-top: 0; font-size: 28px; letter-spacing: -0.5px; }
        p { color: #9ca3af; font-size: 15px; }
        textarea { width: 100%; height: 160px; padding: 16px; background: #1f2937; color: #ffffff; border: 1px solid #374151; border-radius: 6px; box-sizing: border-box; resize: vertical; margin-top: 15px; font-size: 14px; }
        textarea:focus { border-color: #38bdf8; outline: none; }
        button { background: #0284c7; color: white; border: none; padding: 14px 28px; font-size: 16px; border-radius: 6px; cursor: pointer; margin-top: 20px; font-weight: 600; transition: background 0.2s; width: 100%; }
        button:hover { background: #0369a1; }
        #output { margin-top: 30px; background: #1f2937; padding: 25px; border-left: 4px solid #38bdf8; border-radius: 6px; display: none; line-height: 1.7; font-size: 15px; color: #e5e7eb; border-top: 1px solid #374151; border-right: 1px solid #374151; border-bottom: 1px solid #374151; }
        #output h3 { color: #38bdf8; margin-top: 25px; font-size: 18px; border-bottom: 1px solid #374151; padding-bottom: 5px; }
        #output strong { color: #ffffff; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🧭 Meridian Agent Dashboard</h2>
        <p>Paste a lecture or meeting transcript text below to instantly generate interactive quiz elements.</p>
        <textarea id="transcript" placeholder="Teacher: Welcome to class today. Today we are going to learn about the laws of thermodynamics..."></textarea>
        <button onclick="generateQuiz()">Generate Study Kit</button>
        <div id="output"></div>
    </div>

    <!-- Script loaded safely right before body closing tag -->
    <script src="https://jsdelivr.net"></script> 
    <script>
        async function generateQuiz() {
            const textText = document.getElementById('transcript').value;
            const outputDiv = document.getElementById('output');
            if(!textText.trim()) return alert("Please enter transcript text first!");
            
            outputDiv.style.display = "block";
            outputDiv.innerHTML = "🔄 Processing stream transcript via Llama-3 AI Engine...";
            
            try {
                const response = await fetch('/generate-quiz', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textText })
                });
                const data = await response.json();
                
                if(data.quiz) {
                    // Double fallback: Checks if library is fully loaded, else strips characters
                    if (typeof marked !== 'undefined') {
                        outputDiv.innerHTML = marked.parse(data.quiz);
                    } else {
                        // Safe clean cleanup fallback if CDN drops out
                        let cleaned = data.quiz.replace(/###/g, '').replace(/\*\*/g, '');
                        outputDiv.innerText = cleaned;
                    }
                } else if(data.detail) {
                    outputDiv.innerHTML = "❌ Error: " + data.detail;
                } else {
                    outputDiv.innerHTML = "❌ Unknown response received.";
                }
            } catch (err) {
                outputDiv.innerHTML = "❌ Error connecting to server dashboard.";
            }
        }
    </script>
</body>
</html>
